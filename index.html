<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio</title>

<style>
body{
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: rgb(83, 79, 79);
    color: white;
}

#hero{
    width: 90%;
    margin: 5% auto;
    padding: 60px;
    background-image: url(/imagenes/fondo_negro.jpg);
    background-size: cover;
    border-radius: 10px;
}

#hero h1{
    font-size: 70px;
    margin: 0;
}

#hero p{
    font-size: 20px;
    margin-top: 10px;
}

#proyectos{
    width: 90%;
    margin: 50px auto;
}

#proyectos h2{
    font-size: 40px;
    margin-bottom: 30px;
}

.grid{
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    justify-content: center;
}

.card{
    width: 260px;
}

.card img{
    width: 100%;
    border-radius: 10px;
    border: 2px solid white;
    box-shadow: 8px 8px 15px rgba(255,255,255,0.3);
}

.card p{
    font-size: 18px;
    margin-top: 10px;
}

.destacado{
    width: 100%;
    max-width: 250px;
}

.destacado img{
    width: 100%;
}

.centrar{
    text-align: center;
}
</style>
</head>

<body>

<div id="hero">
    <h1>Portafolio</h1>
    <p>David Santiago León Rueda</p>
</div>

<div id="proyectos">
    <h2>Mis proyectos</h2>

    <div class="grid">

        <div class="card destacado">
            <p class="centrar">Hoja de Vida</p>
            <a href="./Hoja de vida/index.html">
                <img src="/imagenes/Hoja_vida.jpg">
            </a>
        </div>

        <div class="card">
            <p class="centrar">Ticket</p>
            <a href="./Ticket de evento/index.html">
                <img src="/imagenes/Ticket.jpg">
            </a>
        </div>

        <div class="card">
            <p class="centrar">¿Quién Soy?</p>
            <a href="/Portafolio/Quien soy/index.html">
                <img src="/imagenes/quien soy.jpg">
            </a>
        </div>

        <div class="card">
            <p class="centrar">Factura</p>
            <a href="/Portafolio/Galeria de facturas/">
                <img src="/imagenes/Factura.png">
            </a>
        </div>

    </div>
</div>

</body>
</html>
