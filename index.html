<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio</title>
    <style>
        body{
            padding: 0%;
            margin: 0;

            background-color: rgb(83, 79, 79);
        }

        #portafolio {

            height: 70vh; 
            width: 90%;  
            margin-left: 6%; 
            padding: 0;
            color:aliceblue;
            
            margin-top: 8%;

            background-size: 660px 600px;
            background-image: url(/Portafolio/imagenes/fondo_negro.jpg) ;
            background-repeat: no-repeat;
        }

        .titulo {
            font-size: 70px;
            padding-top: 6%;
            margin-left: 11%;
            padding-bottom: 0%
        }

        .nombre{
            margin-top: 2%;
            font-size: 25px;
            margin-left: 7%;
            padding: 0%;
        }

        #titulo_proyecto{
            font-size: 65px;
            
            margin: 0%;
            padding: 0%;
            text-align: right;
            margin-right:20%;
        }

        #img1{
            width: 200px;
            height: auto;
            border-radius: 5px;
            border: 3px solid rgb(226, 218, 218);
            box-shadow:10px 10px 15px rgba(255, 255, 255, 0.5);
        }

        #img2{
            width: 400px;
            height: auto;
            border-radius: 5px;
            border: 3px solid rgb(226, 218, 218);
            box-shadow:10px 10px 15px rgba(255, 255, 255, 0.5);
        }

        #img3{
            width: 400px;
            height: auto;
            border-radius: 5px;
            border: 3px solid rgb(226, 218, 218);
            box-shadow:10px 10px 15px rgba(255, 255, 255, 0.5);
        }

        #img4 {
            width:300px ;
        }

        #proyectos table {
            margin-left: auto;
            border-spacing: 30px;
            margin-top: -25%;
            width: auto; 
        }

        #proyectos p{
            font-size: 25px;
            color: aliceblue;
            text-align: center;
        }
    </style>
</head>
<body>
    <div >
        <div id="portafolio">
            <div>
                <p id="titulo_proyecto">Mis proyectos</p>
                <p class="titulo">Portafolio</p>

            </div>
        </div>
    </div>

    <div id="proyectos">
        <table>
                <tr>
                    <td>
                        <p>Hoja de Vida</p>
                        <a href="./Hoja de vida/index.html">
                            <img id="img1" src="/Portafolio/imagenes/Hoja_vida.jpg" alt="hoja de vida">
                            
                        </a>
                    </td>
                    <td>
                        <p>Ticket</p>
                        <a href="./Ticket de evento/index.html">
                            <img id="img2" src="/Portafolio/imagenes/Ticket.jpg" alt="Ticket concierto">
                        </a>
                    </td>
                    <td>
                        <p>¿Quien Soy?</p>
                        <a href="/Portafolio/Quien soy/index.html">
                            <img id="img3" src="/Portafolio/imagenes/quien soy.jpg" alt="Quien soy?">
                        </a>
                    </td>

                    <td>
                        <p>Factura</p>
                        <a href="/Portafolio/Galeria de facturas/">

                        </a>

</html>
